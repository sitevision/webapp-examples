<div class="panel panel-default">
  <div class="panel-heading">
    <h3 class="panel-title"><%= i18n('settings') %></h3>
  </div>

  <div class="panel-body">
    <div class="form-group">
      <label><%= i18n('assistant') %></label>
      <select
        name="aiAssistant"
        data-component="custom-selector"
        data-removable
        required
      >
        <% aiAssistants.forEach(function(aiAssistant) { %>
        <option value="<%- aiAssistant.id %>"><%- aiAssistant.name %></option>
        <% }); %>
      </select>
    </div>
  </div>
</div>
